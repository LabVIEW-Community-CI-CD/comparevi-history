name: published-consumer-validation

on:
  workflow_call:
    inputs:
      consumer_repository:
        description: External consumer repository to validate.
        required: false
        type: string
      consumer_ref:
        description: Ref to validate in the external consumer repository.
        required: false
        type: string
      target_path:
        description: Repository-relative VI path to inspect.
        required: false
        type: string
      compare_modes:
        description: Compare mode bundle to validate.
        required: false
        type: string
      max_pairs:
        description: Maximum adjacent commit pairs to process.
        required: false
        type: string
      max_signal_pairs:
        description: Maximum surfaced signal pairs.
        required: false
        type: string
      latest_immutable_tag:
        description: Optional immutable release tag to validate alongside v1.
        required: false
        type: string
  workflow_dispatch:
    inputs:
      consumer_repository:
        description: External consumer repository to validate.
        required: false
        default: ni/labview-icon-editor
        type: string
      consumer_ref:
        description: Ref to validate in the external consumer repository.
        required: false
        default: develop
        type: string
      target_path:
        description: Repository-relative VI path to inspect.
        required: false
        default: Tooling/deployment/VIP_Post-Install Custom Action.vi
        type: string
      compare_modes:
        description: Compare mode bundle to validate.
        required: false
        default: attributes,front-panel,block-diagram
        type: string
      max_pairs:
        description: Maximum adjacent commit pairs to process.
        required: false
        default: '5'
        type: string
      max_signal_pairs:
        description: Maximum surfaced signal pairs.
        required: false
        default: '5'
        type: string
      latest_immutable_tag:
        description: Optional immutable release tag to validate alongside v1.
        required: false
        default: ''
        type: string
  schedule:
    - cron: '21 9 * * 1'

permissions:
  contents: read

concurrency:
  group: published-consumer-validation-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      consumer_repository: ${{ steps.defaults.outputs.consumer_repository }}
      consumer_ref: ${{ steps.defaults.outputs.consumer_ref }}
      target_path: ${{ steps.defaults.outputs.target_path }}
      compare_modes: ${{ steps.defaults.outputs.compare_modes }}
      max_pairs: ${{ steps.defaults.outputs.max_pairs }}
      max_signal_pairs: ${{ steps.defaults.outputs.max_signal_pairs }}
      latest_immutable_tag: ${{ steps.refs.outputs.latest-immutable-tag }}
    steps:
      - name: Checkout comparevi-history repo
        uses: actions/checkout@v5

      - name: Resolve consumer defaults
        id: defaults
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $consumerRepository = '${{ inputs.consumer_repository }}'
          if ([string]::IsNullOrWhiteSpace($consumerRepository)) {
            $consumerRepository = 'ni/labview-icon-editor'
          }

          $consumerRef = '${{ inputs.consumer_ref }}'
          if ([string]::IsNullOrWhiteSpace($consumerRef)) {
            $consumerRef = 'develop'
          }

          $targetPath = '${{ inputs.target_path }}'
          if ([string]::IsNullOrWhiteSpace($targetPath)) {
            $targetPath = 'Tooling/deployment/VIP_Post-Install Custom Action.vi'
          }

          $compareModes = '${{ inputs.compare_modes }}'
          if ([string]::IsNullOrWhiteSpace($compareModes)) {
            $compareModes = 'attributes,front-panel,block-diagram'
          }

          $maxPairs = '${{ inputs.max_pairs }}'
          if ([string]::IsNullOrWhiteSpace($maxPairs)) {
            $maxPairs = '5'
          }

          $maxSignalPairs = '${{ inputs.max_signal_pairs }}'
          if ([string]::IsNullOrWhiteSpace($maxSignalPairs)) {
            $maxSignalPairs = '5'
          }

          @(
            "consumer_repository=$consumerRepository"
            "consumer_ref=$consumerRef"
            "target_path=$targetPath"
            "compare_modes=$compareModes"
            "max_pairs=$maxPairs"
            "max_signal_pairs=$maxSignalPairs"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve published facade refs
        id: refs
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          & "$PWD/scripts/Resolve-CompareVIHistoryPublishedRefs.ps1" `
            -Repository 'LabVIEW-Community-CI-CD/comparevi-history' `
            -MajorTag 'v1' `
            -LatestImmutableTag '${{ inputs.latest_immutable_tag }}' `
            -GitHubToken $env:GITHUB_TOKEN `
            -GitHubOutputPath $env:GITHUB_OUTPUT `
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY | Out-Null

  validate-major:
    name: published-consumer-major
    needs: plan
    runs-on: windows-latest
    steps:
      - name: Checkout comparevi-history validation repo
        uses: actions/checkout@v5
        with:
          path: validation-support

      - name: Checkout published major facade ref
        uses: actions/checkout@v5
        with:
          repository: LabVIEW-Community-CI-CD/comparevi-history
          ref: v1
          path: published-facade
          fetch-depth: 1

      - name: Checkout external consumer repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.plan.outputs.consumer_repository }}
          ref: ${{ needs.plan.outputs.consumer_ref }}
          path: labview-icon-editor
          fetch-depth: 0

      - name: Write LVCompare stub
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $stubPath = Join-Path $env:GITHUB_WORKSPACE 'labview-icon-editor/tests/results/_comparevi-history-published/major/Invoke-LVCompare.stub.ps1'
          & "$env:GITHUB_WORKSPACE/validation-support/scripts/Write-CompareVIHistorySmokeStub.ps1" -DestinationPath $stubPath

      - name: Run comparevi-history major facade
        id: history
        uses: ./published-facade
        with:
          repository_root: labview-icon-editor
          target_path: ${{ needs.plan.outputs.target_path }}
          start_ref: HEAD
          max_pairs: ${{ needs.plan.outputs.max_pairs }}
          max_signal_pairs: ${{ needs.plan.outputs.max_signal_pairs }}
          mode: ${{ needs.plan.outputs.compare_modes }}
          results_dir: tests/results/_comparevi-history-published/major/history
          detailed: true
          render_report: true
          invoke_script_path: tests/results/_comparevi-history-published/major/Invoke-LVCompare.stub.ps1

      - name: Assert major published consumer outputs
        shell: pwsh
        env:
          ACTION_REF: LabVIEW-Community-CI-CD/comparevi-history@v1
          CONSUMER_REPOSITORY: ${{ needs.plan.outputs.consumer_repository }}
          CONSUMER_REF: ${{ needs.plan.outputs.consumer_ref }}
          TARGET_PATH: ${{ needs.plan.outputs.target_path }}
          EXPECTED_MODE_LIST: ${{ needs.plan.outputs.compare_modes }}
          MANIFEST_PATH: ${{ steps.history.outputs['manifest-path'] }}
          RESULTS_DIR: ${{ steps.history.outputs['results-dir'] }}
          MODE_COUNT: ${{ steps.history.outputs['mode-count'] }}
          MODE_LIST: ${{ steps.history.outputs['mode-list'] }}
          REQUESTED_MODE_LIST: ${{ steps.history.outputs['requested-mode-list'] }}
          EXECUTED_MODE_LIST: ${{ steps.history.outputs['executed-mode-list'] }}
          MODE_MANIFESTS_JSON: ${{ steps.history.outputs['mode-manifests-json'] }}
          HISTORY_REPORT_MD: ${{ steps.history.outputs['history-report-md'] }}
          HISTORY_REPORT_HTML: ${{ steps.history.outputs['history-report-html'] }}
          TOTAL_PROCESSED: ${{ steps.history.outputs['total-processed'] }}
          TOTAL_DIFFS: ${{ steps.history.outputs['total-diffs'] }}
          STOP_REASON: ${{ steps.history.outputs['stop-reason'] }}
          ARTIFACT_NAME: comparevi-history-published-major-${{ github.run_id }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          & "$env:GITHUB_WORKSPACE/validation-support/scripts/Assert-CompareVIHistoryPublishedRun.ps1" `
            -ActionRef $env:ACTION_REF `
            -ConsumerRepository $env:CONSUMER_REPOSITORY `
            -ConsumerRef $env:CONSUMER_REF `
            -TargetPath $env:TARGET_PATH `
            -ExpectedModeList $env:EXPECTED_MODE_LIST `
            -ManifestPath $env:MANIFEST_PATH `
            -ResultsDir $env:RESULTS_DIR `
            -ModeCount $env:MODE_COUNT `
            -ModeList $env:MODE_LIST `
            -RequestedModeList $env:REQUESTED_MODE_LIST `
            -ExecutedModeList $env:EXECUTED_MODE_LIST `
            -ModeManifestsJson $env:MODE_MANIFESTS_JSON `
            -HistoryReportMd $env:HISTORY_REPORT_MD `
            -HistoryReportHtml $env:HISTORY_REPORT_HTML `
            -TotalProcessed $env:TOTAL_PROCESSED `
            -TotalDiffs $env:TOTAL_DIFFS `
            -StopReason $env:STOP_REASON `
            -ArtifactName $env:ARTIFACT_NAME `
            -EvidencePath 'labview-icon-editor/tests/results/_comparevi-history-published/major/published-evidence.json' `
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY | Out-Null

      - name: Upload major published consumer artifacts
        uses: actions/upload-artifact@v5
        with:
          name: comparevi-history-published-major-${{ github.run_id }}
          path: |
            ${{ steps.history.outputs['results-dir'] }}/**
            labview-icon-editor/tests/results/_comparevi-history-published/major/published-evidence.json
          if-no-files-found: error

  validate-immutable:
    name: published-consumer-immutable
    needs: plan
    runs-on: windows-latest
    steps:
      - name: Checkout comparevi-history validation repo
        uses: actions/checkout@v5
        with:
          path: validation-support

      - name: Checkout published immutable facade ref
        uses: actions/checkout@v5
        with:
          repository: LabVIEW-Community-CI-CD/comparevi-history
          ref: ${{ needs.plan.outputs.latest_immutable_tag }}
          path: published-facade
          fetch-depth: 1

      - name: Checkout external consumer repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.plan.outputs.consumer_repository }}
          ref: ${{ needs.plan.outputs.consumer_ref }}
          path: labview-icon-editor
          fetch-depth: 0

      - name: Write LVCompare stub
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $stubPath = Join-Path $env:GITHUB_WORKSPACE 'labview-icon-editor/tests/results/_comparevi-history-published/immutable/Invoke-LVCompare.stub.ps1'
          & "$env:GITHUB_WORKSPACE/validation-support/scripts/Write-CompareVIHistorySmokeStub.ps1" -DestinationPath $stubPath

      - name: Run comparevi-history immutable facade
        id: history
        uses: ./published-facade
        with:
          repository_root: labview-icon-editor
          target_path: ${{ needs.plan.outputs.target_path }}
          start_ref: HEAD
          max_pairs: ${{ needs.plan.outputs.max_pairs }}
          max_signal_pairs: ${{ needs.plan.outputs.max_signal_pairs }}
          mode: ${{ needs.plan.outputs.compare_modes }}
          results_dir: tests/results/_comparevi-history-published/immutable/history
          detailed: true
          render_report: true
          invoke_script_path: tests/results/_comparevi-history-published/immutable/Invoke-LVCompare.stub.ps1

      - name: Assert immutable published consumer outputs
        shell: pwsh
        env:
          ACTION_REF: LabVIEW-Community-CI-CD/comparevi-history@${{ needs.plan.outputs.latest_immutable_tag }}
          CONSUMER_REPOSITORY: ${{ needs.plan.outputs.consumer_repository }}
          CONSUMER_REF: ${{ needs.plan.outputs.consumer_ref }}
          TARGET_PATH: ${{ needs.plan.outputs.target_path }}
          EXPECTED_MODE_LIST: ${{ needs.plan.outputs.compare_modes }}
          MANIFEST_PATH: ${{ steps.history.outputs['manifest-path'] }}
          RESULTS_DIR: ${{ steps.history.outputs['results-dir'] }}
          MODE_COUNT: ${{ steps.history.outputs['mode-count'] }}
          MODE_LIST: ${{ steps.history.outputs['mode-list'] }}
          REQUESTED_MODE_LIST: ${{ steps.history.outputs['requested-mode-list'] }}
          EXECUTED_MODE_LIST: ${{ steps.history.outputs['executed-mode-list'] }}
          MODE_MANIFESTS_JSON: ${{ steps.history.outputs['mode-manifests-json'] }}
          HISTORY_REPORT_MD: ${{ steps.history.outputs['history-report-md'] }}
          HISTORY_REPORT_HTML: ${{ steps.history.outputs['history-report-html'] }}
          TOTAL_PROCESSED: ${{ steps.history.outputs['total-processed'] }}
          TOTAL_DIFFS: ${{ steps.history.outputs['total-diffs'] }}
          STOP_REASON: ${{ steps.history.outputs['stop-reason'] }}
          ARTIFACT_NAME: comparevi-history-published-immutable-${{ github.run_id }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          & "$env:GITHUB_WORKSPACE/validation-support/scripts/Assert-CompareVIHistoryPublishedRun.ps1" `
            -ActionRef $env:ACTION_REF `
            -ConsumerRepository $env:CONSUMER_REPOSITORY `
            -ConsumerRef $env:CONSUMER_REF `
            -TargetPath $env:TARGET_PATH `
            -ExpectedModeList $env:EXPECTED_MODE_LIST `
            -ManifestPath $env:MANIFEST_PATH `
            -ResultsDir $env:RESULTS_DIR `
            -ModeCount $env:MODE_COUNT `
            -ModeList $env:MODE_LIST `
            -RequestedModeList $env:REQUESTED_MODE_LIST `
            -ExecutedModeList $env:EXECUTED_MODE_LIST `
            -ModeManifestsJson $env:MODE_MANIFESTS_JSON `
            -HistoryReportMd $env:HISTORY_REPORT_MD `
            -HistoryReportHtml $env:HISTORY_REPORT_HTML `
            -TotalProcessed $env:TOTAL_PROCESSED `
            -TotalDiffs $env:TOTAL_DIFFS `
            -StopReason $env:STOP_REASON `
            -ArtifactName $env:ARTIFACT_NAME `
            -EvidencePath 'labview-icon-editor/tests/results/_comparevi-history-published/immutable/published-evidence.json' `
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY | Out-Null

      - name: Upload immutable published consumer artifacts
        uses: actions/upload-artifact@v5
        with:
          name: comparevi-history-published-immutable-${{ github.run_id }}
          path: |
            ${{ steps.history.outputs['results-dir'] }}/**
            labview-icon-editor/tests/results/_comparevi-history-published/immutable/published-evidence.json
          if-no-files-found: error
