name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout facade repo
        uses: actions/checkout@v5

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          version='1.7.7'
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint

      - name: Lint workflows
        shell: bash
        run: ./actionlint -color

      - name: Validate backend pin and facade scripts
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $backendRef = (Get-Content -LiteralPath 'comparevi-backend-ref.txt' -Raw).Trim()
          if ($backendRef -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "comparevi-backend-ref.txt must contain a backend release tag. Actual: $backendRef"
          }

          $headers = @{
            Accept = 'application/vnd.github+json'
            'User-Agent' = 'comparevi-history-ci'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            $headers.Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/LabVIEW-Community-CI-CD/compare-vi-cli-action/releases/tags/$backendRef" `
            -Headers $headers
          $bundleAsset = @($release.assets | Where-Object { $_.name -like 'CompareVI.Tools-v*.zip' } | Select-Object -First 1)
          if (-not $bundleAsset) {
            throw "Backend release '$backendRef' does not publish a CompareVI.Tools zip asset."
          }

          foreach ($path in @(
            'scripts/Resolve-CompareVIHistoryBackend.ps1',
            'scripts/Acquire-CompareVIToolsBundle.ps1',
            'scripts/Invoke-CompareVIHistoryFacade.ps1',
            'scripts/Write-CompareVIHistorySmokeStub.ps1'
          )) {
            $errors = $null
            $tokens = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$errors)
            if ($errors) {
              $messages = $errors | ForEach-Object { $_.Message }
              throw ("PowerShell parse errors in {0}: {1}" -f $path, ($messages -join '; '))
            }
          }

          $stubPath = Join-Path $env:RUNNER_TEMP 'comparevi-history-smoke-stub.ps1'
          & "$PWD/scripts/Write-CompareVIHistorySmokeStub.ps1" -DestinationPath $stubPath

          $errors = $null
          $tokens = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile($stubPath, [ref]$tokens, [ref]$errors)
          if ($errors) {
            $messages = $errors | ForEach-Object { $_.Message }
            throw ("Generated smoke stub parse errors: {0}" -f ($messages -join '; '))
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              '## comparevi-history lint'
              ''
              '- actionlint passed'
              ('- Backend release pin: `{0}`' -f $backendRef)
              ('- Backend bundle asset: `{0}`' -f $bundleAsset.name)
              '- PowerShell facade scripts parsed successfully'
              '- Generated smoke stub parsed successfully'
            ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Validate trust guard scenarios
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "$PWD/scripts/Test-CompareVIHistoryTrust.ps1"
