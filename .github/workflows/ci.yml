name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout facade repo
        uses: actions/checkout@v5

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          version='1.7.7'
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint

      - name: Lint workflows
        shell: bash
        run: |
          set -euo pipefail
          ./actionlint -color
          ./actionlint -color \
            docs/examples/comparevi-history-workflow-dispatch.yml \
            docs/examples/comparevi-history-comment-gated.yml

      - name: Validate backend pin and facade scripts
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $backendRef = (Get-Content -LiteralPath 'comparevi-backend-ref.txt' -Raw).Trim()
          if ($backendRef -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "comparevi-backend-ref.txt must contain a backend release tag. Actual: $backendRef"
          }

          $headers = @{
            Accept = 'application/vnd.github+json'
            'User-Agent' = 'comparevi-history-ci'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            $headers.Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/LabVIEW-Community-CI-CD/compare-vi-cli-action/releases/tags/$backendRef" `
            -Headers $headers
          $bundleAsset = @($release.assets | Where-Object { $_.name -like 'CompareVI.Tools-v*.zip' } | Select-Object -First 1)
          if (-not $bundleAsset) {
            throw "Backend release '$backendRef' does not publish a CompareVI.Tools zip asset."
          }

          $acquireOutputPath = Join-Path $env:RUNNER_TEMP 'comparevi-history-bundle-acquire.out'
          $bundleDestination = Join-Path $env:RUNNER_TEMP 'comparevi-history-tools'
          & "$PWD/scripts/Acquire-CompareVIToolsBundle.ps1" `
            -Repository 'LabVIEW-Community-CI-CD/compare-vi-cli-action' `
            -ReleaseTag $backendRef `
            -BundleAssetName ([string]$bundleAsset.name) `
            -BundleAssetUrl ([string]$bundleAsset.browser_download_url) `
            -BundleAssetDigest $(if ($bundleAsset.PSObject.Properties['digest']) { [string]$bundleAsset.digest } else { '' }) `
            -DestinationPath $bundleDestination `
            -GitHubToken $env:GITHUB_TOKEN `
            -GitHubOutputPath $acquireOutputPath `
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY

          $acquireValues = @{}
          foreach ($line in Get-Content -LiteralPath $acquireOutputPath) {
            if ($line -match '^(?<key>[^=]+)=(?<value>.*)$') {
              $acquireValues[$Matches['key']] = $Matches['value']
            }
          }

          foreach ($requiredOutput in @('tooling-path', 'hosted-runner-script-path', 'hosted-runner-default-image')) {
            if (-not $acquireValues.ContainsKey($requiredOutput) -or [string]::IsNullOrWhiteSpace([string]$acquireValues[$requiredOutput])) {
              throw "Bundle acquisition did not emit required output '$requiredOutput'."
            }
          }

          foreach ($path in @(
            'scripts/Resolve-CompareVIHistoryBackend.ps1',
            'scripts/Acquire-CompareVIToolsBundle.ps1',
            'scripts/Resolve-CompareVIHistoryPublishedRefs.ps1',
            'scripts/Invoke-CompareVIHistoryFacade.ps1',
            'scripts/Resolve-CompareVIHistoryPublicModes.ps1',
            'scripts/Format-CompareVIHistoryModeSummary.ps1',
            'scripts/Assert-CompareVIHistoryPublishedRun.ps1',
            'scripts/Sync-CompareVIHistoryPublishedTemplates.ps1',
            'scripts/Write-CompareVIHistorySmokeStub.ps1',
            'scripts/Test-CompareVIHistoryBranchProtection.ps1',
            'scripts/Test-CompareVIHistoryTemplateContracts.ps1'
          )) {
            $errors = $null
            $tokens = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$errors)
            if ($errors) {
              $messages = $errors | ForEach-Object { $_.Message }
              throw ("PowerShell parse errors in {0}: {1}" -f $path, ($messages -join '; '))
            }
          }

          $stubPath = Join-Path $env:RUNNER_TEMP 'comparevi-history-smoke-stub.ps1'
          & "$PWD/scripts/Write-CompareVIHistorySmokeStub.ps1" -DestinationPath $stubPath

          $errors = $null
          $tokens = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile($stubPath, [ref]$tokens, [ref]$errors)
          if ($errors) {
            $messages = $errors | ForEach-Object { $_.Message }
            throw ("Generated smoke stub parse errors: {0}" -f ($messages -join '; '))
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              '## comparevi-history lint'
              ''
              '- actionlint passed'
              ('- Backend release pin: `{0}`' -f $backendRef)
              ('- Backend bundle asset: `{0}`' -f $bundleAsset.name)
              ('- Hosted runner script path: `{0}`' -f $acquireValues['hosted-runner-script-path'])
              ('- Hosted runner default image: `{0}`' -f $acquireValues['hosted-runner-default-image'])
              '- Backend bundle acquisition passed with the hosted-runner contract'
              '- PowerShell facade scripts parsed successfully'
              '- Branch-protection drift script parsed successfully'
              '- Consumer PR-diagnostics example workflows linted successfully'
              '- Published consumer validation helpers parsed successfully'
              '- Generated smoke stub parsed successfully'
            ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Validate comparevi-history script seams
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "$PWD/scripts/Test-CompareVIHistoryTrust.ps1"
          & "$PWD/scripts/Test-CompareVIHistoryPublicModes.ps1"
          & "$PWD/scripts/Test-CompareVIHistoryPublishedRefs.ps1"
          & "$PWD/scripts/Test-CompareVIHistoryModeSummary.ps1"
          & "$PWD/scripts/Test-CompareVIHistoryPublishedRun.ps1"
          & "$PWD/scripts/Test-CompareVIHistoryTemplateContracts.ps1"
