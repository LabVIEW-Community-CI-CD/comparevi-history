name: release

on:
  pull_request:
    branches:
      - main
    paths:
      - action.yml
      - .github/workflows/release.yml
      - .github/workflows/smoke.yml
      - scripts/Resolve-CompareVIHistoryBackend.ps1
      - scripts/Acquire-CompareVIToolsBundle.ps1
      - scripts/Write-CompareVIHistorySmokeStub.ps1
      - README.md
      - comparevi-backend-ref.txt
      - .github/workflows/published-consumer-validation.yml
      - scripts/Resolve-CompareVIHistoryPublishedRefs.ps1
      - scripts/Format-CompareVIHistoryModeSummary.ps1
      - scripts/Assert-CompareVIHistoryPublishedRun.ps1
      - scripts/Sync-CompareVIHistoryPublishedTemplates.ps1
      - scripts/Test-CompareVIHistoryTemplateContracts.ps1
      - docs/SAFE_PR_DIAGNOSTICS_TEMPLATES.md
      - docs/examples/comparevi-history-workflow-dispatch.yml
      - docs/examples/comparevi-history-comment-gated.yml
  workflow_dispatch:
    inputs:
      backend_ref:
        description: compare-vi-cli-action ref to pin for this release
        required: true
        type: string
      immutable_tag:
        description: Immutable facade tag to create, for example v1.0.2
        required: true
        type: string
      major_tag:
        description: Moving major tag to update after smoke passes
        required: false
        default: v1
        type: string
      comparevi_repository:
        description: Backend tooling repository
        required: false
        default: LabVIEW-Community-CI-CD/compare-vi-cli-action
        type: string
      consumer_repository:
        description: External consumer repository for smoke coverage
        required: false
        default: ni/labview-icon-editor
        type: string
      consumer_ref:
        description: Ref for the external consumer smoke checkout
        required: false
        default: develop
        type: string
      publish:
        description: Publish the release after smoke passes
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate:
    name: release-validate
    runs-on: ubuntu-latest
    outputs:
      backend_tag: ${{ steps.plan.outputs.backend_tag }}
      backend_sha: ${{ steps.plan.outputs.backend_sha }}
      comparevi_repository: ${{ steps.plan.outputs.comparevi_repository }}
      immutable_tag: ${{ steps.plan.outputs.immutable_tag }}
      major_tag: ${{ steps.plan.outputs.major_tag }}
      publish: ${{ steps.plan.outputs.publish }}
      consumer_repository: ${{ steps.plan.outputs.consumer_repository }}
      consumer_ref: ${{ steps.plan.outputs.consumer_ref }}
      current_backend_ref: ${{ steps.plan.outputs.current_backend_ref }}
    steps:
      - name: Checkout facade repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release inputs
        id: plan
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_BACKEND_REF: ${{ inputs.backend_ref }}
          INPUT_IMMUTABLE_TAG: ${{ inputs.immutable_tag }}
          INPUT_MAJOR_TAG: ${{ inputs.major_tag }}
          INPUT_COMPAREVI_REPOSITORY: ${{ inputs.comparevi_repository }}
          INPUT_CONSUMER_REPOSITORY: ${{ inputs.consumer_repository }}
          INPUT_CONSUMER_REF: ${{ inputs.consumer_ref }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $requestedBackendRef = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $env:INPUT_BACKEND_REF
          } else {
            (Get-Content -LiteralPath 'comparevi-backend-ref.txt' -Raw).Trim()
          }
          $immutableTag = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_IMMUTABLE_TAG } else { "v0.0.$env:GITHUB_RUN_NUMBER" }
          $majorTag = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_MAJOR_TAG } else { 'v1' }
          $compareviRepository = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_COMPAREVI_REPOSITORY } else { 'LabVIEW-Community-CI-CD/compare-vi-cli-action' }
          $consumerRepository = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_CONSUMER_REPOSITORY } else { 'ni/labview-icon-editor' }
          $consumerRef = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_CONSUMER_REF } else { 'develop' }
          $publish = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { [string]$env:INPUT_PUBLISH } else { 'false' }

          if ($immutableTag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+$') {
            throw 'immutable_tag must match v<major>.<minor>.<patch>.'
          }

          if ($majorTag -notmatch '^v[0-9]+$') {
            throw 'major_tag must match v<major>.'
          }

          if ($publish -eq 'true' -and $env:GITHUB_REF_NAME -ne 'main') {
            throw 'publish=true is only allowed when dispatching from main.'
          }

          $currentBackendRef = (Get-Content -LiteralPath 'comparevi-backend-ref.txt' -Raw).Trim()
          $resolverOutputPath = Join-Path $env:RUNNER_TEMP 'comparevi-backend-resolution.out'
          if (Test-Path -LiteralPath $resolverOutputPath) {
            Remove-Item -LiteralPath $resolverOutputPath -Force
          }

          & "$PWD/scripts/Resolve-CompareVIHistoryBackend.ps1" `
            -Repository $compareviRepository `
            -RequestedRef $requestedBackendRef `
            -DefaultRefPath '' `
            -ActionRef '' `
            -ToolingPath '.comparevi-history-tools' `
            -GitHubToken $env:GITHUB_TOKEN `
            -GitHubOutputPath $resolverOutputPath `
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY

          $resolverValues = @{}
          foreach ($line in Get-Content -LiteralPath $resolverOutputPath) {
            if ($line -match '^(?<key>[^=]+)=(?<value>.*)$') {
              $resolverValues[$matches['key']] = $matches['value']
            }
          }

          if ($resolverValues['tooling-source'] -ne 'bundle') {
            throw "Release automation requires an immutable CompareVI.Tools bundle release tag. Resolution kind was '$($resolverValues['tooling-source'])'."
          }

          $backendTag = $resolverValues['comparevi-ref']
          if ([string]::IsNullOrWhiteSpace($backendTag)) {
            throw 'Resolved backend release tag was empty.'
          }

          git fetch --tags --force origin
          $existingTag = (& git tag --list $immutableTag)
          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            throw "Tag $immutableTag already exists."
          }

          $backendSha = $resolverValues['resolved-sha']
          if ([string]::IsNullOrWhiteSpace($backendSha)) {
            throw "Resolved backend SHA was empty for backend tag '$backendTag'."
          }

          $releasePlan = [ordered]@{
            schema = 'comparevi-history-release-plan@v1'
            facadeRepository = $env:GITHUB_REPOSITORY
            facadeRef = $env:GITHUB_SHA
            backendRepository = $compareviRepository
            requestedBackendRef = $requestedBackendRef
            resolvedBackendTag = $backendTag
            resolvedBackendSha = $backendSha
            currentBackendRef = $currentBackendRef
            immutableTag = $immutableTag
            majorTag = $majorTag
            consumerRepository = $consumerRepository
            consumerRef = $consumerRef
            publish = [System.Convert]::ToBoolean($publish)
          }
          $releasePlan | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath 'release-plan.json' -Encoding utf8

          Get-Content -LiteralPath $resolverOutputPath | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          @(
            "backend_tag=$backendTag"
            "backend_sha=$backendSha"
            "comparevi_repository=$compareviRepository"
            "immutable_tag=$immutableTag"
            "major_tag=$majorTag"
            "publish=$publish"
            "consumer_repository=$consumerRepository"
            "consumer_ref=$consumerRef"
            "current_backend_ref=$currentBackendRef"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release plan artifact
        uses: actions/upload-artifact@v5
        with:
          name: comparevi-history-release-plan-${{ github.run_id }}
          path: release-plan.json
          if-no-files-found: error

      - name: Summarize release plan
        shell: bash
        run: |
          {
            echo '## comparevi-history release plan'
            echo
            echo "- Backend repo: \`${{ steps.plan.outputs.comparevi_repository }}\`"
            echo "- Requested backend ref: \`${{ github.event_name == 'workflow_dispatch' && inputs.backend_ref || steps.plan.outputs.current_backend_ref }}\`"
            echo "- Resolved backend tag: \`${{ steps.plan.outputs.backend_tag }}\`"
            echo "- Resolved backend SHA: \`${{ steps.plan.outputs.backend_sha }}\`"
            echo "- Current backend ref: \`${{ steps.plan.outputs.current_backend_ref }}\`"
            echo "- Immutable tag: \`${{ steps.plan.outputs.immutable_tag }}\`"
            echo "- Major tag: \`${{ steps.plan.outputs.major_tag }}\`"
            echo "- External consumer: \`${{ steps.plan.outputs.consumer_repository }}@${{ steps.plan.outputs.consumer_ref }}\`"
            echo "- Publish: \`${{ steps.plan.outputs.publish }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-local:
    name: release-smoke-local
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout facade repo
        uses: actions/checkout@v5

      - name: Checkout backend target repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.validate.outputs.comparevi_repository }}
          ref: ${{ needs.validate.outputs.backend_tag }}
          path: compare-vi-cli-action
          fetch-depth: 0

      - name: Run facade action against backend fixture repo
        id: history
        uses: ./
        with:
          repository_root: compare-vi-cli-action
          target_path: fixtures/vi-stage/bd-cosmetic/Head.vi
          start_ref: HEAD
          max_pairs: 1
          mode: default
          results_dir: tests/results/_facade-release/local
          detailed: true
          render_report: true
          comparevi_repository: ${{ needs.validate.outputs.comparevi_repository }}
          comparevi_ref: ${{ needs.validate.outputs.backend_tag }}
          invoke_script_path: tests/stubs/Invoke-LVCompare.stub.ps1

      - name: Assert local smoke outputs
        shell: pwsh
        env:
          MANIFEST_PATH: ${{ steps.history.outputs['manifest-path'] }}
          RESULTS_DIR: ${{ steps.history.outputs['results-dir'] }}
          HISTORY_REPORT_MD: ${{ steps.history.outputs['history-report-md'] }}
          HISTORY_REPORT_HTML: ${{ steps.history.outputs['history-report-html'] }}
          TOTAL_PROCESSED: ${{ steps.history.outputs['total-processed'] }}
          TOTAL_DIFFS: ${{ steps.history.outputs['total-diffs'] }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          foreach ($path in @($env:MANIFEST_PATH, $env:RESULTS_DIR, $env:HISTORY_REPORT_MD, $env:HISTORY_REPORT_HTML)) {
            if ([string]::IsNullOrWhiteSpace($path)) {
              throw 'Expected facade output path was empty.'
            }
          }

          if (-not (Test-Path -LiteralPath $env:MANIFEST_PATH -PathType Leaf)) {
            throw "Manifest not found: $env:MANIFEST_PATH"
          }
          if (-not (Test-Path -LiteralPath $env:RESULTS_DIR -PathType Container)) {
            throw "Results directory not found: $env:RESULTS_DIR"
          }
          if (-not (Test-Path -LiteralPath $env:HISTORY_REPORT_MD -PathType Leaf)) {
            throw "Markdown report not found: $env:HISTORY_REPORT_MD"
          }
          if (-not (Test-Path -LiteralPath $env:HISTORY_REPORT_HTML -PathType Leaf)) {
            throw "HTML report not found: $env:HISTORY_REPORT_HTML"
          }

          if ([string]::IsNullOrWhiteSpace($env:TOTAL_PROCESSED) -or [int]$env:TOTAL_PROCESSED -lt 1) {
            throw "Expected total-processed >= 1. Actual: $($env:TOTAL_PROCESSED)"
          }

          @(
            '## comparevi-history local release smoke'
            ''
            ('- Manifest: `{0}`' -f $env:MANIFEST_PATH)
            ('- Results dir: `{0}`' -f $env:RESULTS_DIR)
            ('- Markdown report: `{0}`' -f $env:HISTORY_REPORT_MD)
            ('- HTML report: `{0}`' -f $env:HISTORY_REPORT_HTML)
            ('- Total processed: `{0}`' -f $env:TOTAL_PROCESSED)
            ('- Total diffs: `{0}`' -f $env:TOTAL_DIFFS)
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload local release smoke artifacts
        uses: actions/upload-artifact@v5
        with:
          name: comparevi-history-release-local-${{ github.run_id }}
          path: ${{ steps.history.outputs['results-dir'] }}/**
          if-no-files-found: error

  smoke-external:
    name: release-smoke-external
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout facade repo
        uses: actions/checkout@v5

      - name: Checkout external consumer repo
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.validate.outputs.consumer_repository }}
          ref: ${{ needs.validate.outputs.consumer_ref }}
          path: labview-icon-editor
          fetch-depth: 0

      - name: Write external smoke LVCompare stub
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $stubPath = Join-Path $env:GITHUB_WORKSPACE 'labview-icon-editor/tests/results/_comparevi-history-release/Invoke-LVCompare.stub.ps1'
          & "$env:GITHUB_WORKSPACE/scripts/Write-CompareVIHistorySmokeStub.ps1" -DestinationPath $stubPath

      - name: Run facade action against external consumer repo
        id: history
        uses: ./
        with:
          repository_root: labview-icon-editor
          target_path: Tooling/deployment/VIP_Post-Install Custom Action.vi
          start_ref: HEAD
          max_pairs: 1
          max_signal_pairs: 5
          mode: default,attributes,front-panel,block-diagram
          results_dir: tests/results/_comparevi-history-release/history
          detailed: true
          render_report: true
          comparevi_repository: ${{ needs.validate.outputs.comparevi_repository }}
          comparevi_ref: ${{ needs.validate.outputs.backend_tag }}
          invoke_script_path: tests/results/_comparevi-history-release/Invoke-LVCompare.stub.ps1

      - name: Assert external smoke outputs
        shell: pwsh
        env:
          ACTION_REF: comparevi-history@workspace
          TARGET_PATH: Tooling/deployment/VIP_Post-Install Custom Action.vi
          EXPECTED_MODE_LIST: default,attributes,front-panel,block-diagram
          MANIFEST_PATH: ${{ steps.history.outputs['manifest-path'] }}
          RESULTS_DIR: ${{ steps.history.outputs['results-dir'] }}
          MODE_COUNT: ${{ steps.history.outputs['mode-count'] }}
          MODE_LIST: ${{ steps.history.outputs['mode-list'] }}
          REQUESTED_MODE_LIST: ${{ steps.history.outputs['requested-mode-list'] }}
          EXECUTED_MODE_LIST: ${{ steps.history.outputs['executed-mode-list'] }}
          MODE_MANIFESTS_JSON: ${{ steps.history.outputs['mode-manifests-json'] }}
          HISTORY_REPORT_MD: ${{ steps.history.outputs['history-report-md'] }}
          HISTORY_REPORT_HTML: ${{ steps.history.outputs['history-report-html'] }}
          TOTAL_PROCESSED: ${{ steps.history.outputs['total-processed'] }}
          TOTAL_DIFFS: ${{ steps.history.outputs['total-diffs'] }}
          STOP_REASON: ${{ steps.history.outputs['stop-reason'] }}
          ARTIFACT_NAME: comparevi-history-release-external-${{ github.run_id }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          & "$PWD/scripts/Assert-CompareVIHistoryPublishedRun.ps1" `
            -ActionRef $env:ACTION_REF `
            -ConsumerRepository '${{ needs.validate.outputs.consumer_repository }}' `
            -ConsumerRef '${{ needs.validate.outputs.consumer_ref }}' `
            -TargetPath $env:TARGET_PATH `
            -ExpectedModeList $env:EXPECTED_MODE_LIST `
            -ManifestPath $env:MANIFEST_PATH `
            -ResultsDir $env:RESULTS_DIR `
            -ModeCount $env:MODE_COUNT `
            -ModeList $env:MODE_LIST `
            -RequestedModeList $env:REQUESTED_MODE_LIST `
            -ExecutedModeList $env:EXECUTED_MODE_LIST `
            -ModeManifestsJson $env:MODE_MANIFESTS_JSON `
            -HistoryReportMd $env:HISTORY_REPORT_MD `
            -HistoryReportHtml $env:HISTORY_REPORT_HTML `
            -TotalProcessed $env:TOTAL_PROCESSED `
            -TotalDiffs $env:TOTAL_DIFFS `
            -StopReason $env:STOP_REASON `
            -ArtifactName $env:ARTIFACT_NAME `
            -EvidencePath 'labview-icon-editor/tests/results/_comparevi-history-release/published-evidence.json' `
            -StepSummaryPath $env:GITHUB_STEP_SUMMARY

      - name: Upload external release smoke artifacts
        uses: actions/upload-artifact@v5
        with:
          name: comparevi-history-release-external-${{ github.run_id }}
          path: |
            ${{ steps.history.outputs['results-dir'] }}/**
            labview-icon-editor/tests/results/_comparevi-history-release/published-evidence.json
          if-no-files-found: error

  publish:
    name: release-publish
    if: ${{ needs.validate.outputs.publish == 'true' }}
    needs:
      - validate
      - smoke-local
      - smoke-external
    runs-on: ubuntu-latest
    steps:
      - name: Checkout facade repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Update backend pin and create release notes
        id: prepare
        shell: bash
        env:
          BACKEND_SHA: ${{ needs.validate.outputs.backend_sha }}
          BACKEND_TAG: ${{ needs.validate.outputs.backend_tag }}
          BACKEND_REPOSITORY: ${{ needs.validate.outputs.comparevi_repository }}
          IMMUTABLE_TAG: ${{ needs.validate.outputs.immutable_tag }}
          MAJOR_TAG: ${{ needs.validate.outputs.major_tag }}
        run: |
          set -euo pipefail

          printf '%s\n' "$BACKEND_TAG" > comparevi-backend-ref.txt
          pwsh -NoLogo -NoProfile -File scripts/Sync-CompareVIHistoryPublishedTemplates.ps1 -ImmutableTag "$IMMUTABLE_TAG" > /dev/null

          if ! git diff --quiet -- comparevi-backend-ref.txt docs/examples/comparevi-history-comment-gated.yml docs/SAFE_PR_DIAGNOSTICS_TEMPLATES.md; then
            git add comparevi-backend-ref.txt docs/examples/comparevi-history-comment-gated.yml docs/SAFE_PR_DIAGNOSTICS_TEMPLATES.md
            git commit -m "Release comparevi-history $IMMUTABLE_TAG (#1)"
          fi

          target_sha="$(git rev-parse HEAD)"

          cat > release-notes.md <<EOF
          ## comparevi-history $IMMUTABLE_TAG

          - Facade repository: \`${GITHUB_REPOSITORY}\`
          - Facade commit: \`${target_sha}\`
          - Backend repository: \`${BACKEND_REPOSITORY}\`
          - Backend tag: \`${BACKEND_TAG}\`
          - Backend ref: \`${BACKEND_SHA}\`
          - Major tag updated: \`${MAJOR_TAG}\`
          - Smoke workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ### Published contract

          - \`comparevi-backend-ref.txt\` now pins backend release tag \`${BACKEND_TAG}\`
          - Backend source SHA for that tag is \`${BACKEND_SHA}\`
          - \`${IMMUTABLE_TAG}\` is the immutable facade tag for this backend mapping
          - \`${MAJOR_TAG}\` advances only after smoke and release publication succeed
          - Published comment-gated template now points at \`${IMMUTABLE_TAG}\`
          EOF

          echo "target-sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Push release commit and immutable tag
        shell: bash
        env:
          IMMUTABLE_TAG: ${{ needs.validate.outputs.immutable_tag }}
        run: |
          set -euo pipefail
          git tag "$IMMUTABLE_TAG" "${{ steps.prepare.outputs.target-sha }}"
          git push --atomic origin HEAD:main "refs/tags/$IMMUTABLE_TAG"

      - name: Create GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMMUTABLE_TAG: ${{ needs.validate.outputs.immutable_tag }}
        run: |
          set -euo pipefail
          gh release create "$IMMUTABLE_TAG" \
            --title "comparevi-history $IMMUTABLE_TAG" \
            --notes-file release-notes.md

      - name: Move major tag
        shell: bash
        env:
          IMMUTABLE_TAG: ${{ needs.validate.outputs.immutable_tag }}
          MAJOR_TAG: ${{ needs.validate.outputs.major_tag }}
        run: |
          set -euo pipefail
          git tag -f "$MAJOR_TAG" "$IMMUTABLE_TAG"
          git push origin "refs/tags/$MAJOR_TAG" --force

      - name: Summarize published release
        shell: bash
        env:
          IMMUTABLE_TAG: ${{ needs.validate.outputs.immutable_tag }}
          MAJOR_TAG: ${{ needs.validate.outputs.major_tag }}
          BACKEND_SHA: ${{ needs.validate.outputs.backend_sha }}
          BACKEND_TAG: ${{ needs.validate.outputs.backend_tag }}
        run: |
          {
            echo '## comparevi-history published release'
            echo
            echo "- Immutable tag: \`${IMMUTABLE_TAG}\`"
            echo "- Major tag: \`${MAJOR_TAG}\`"
            echo "- Backend tag: \`${BACKEND_TAG}\`"
            echo "- Backend ref: \`${BACKEND_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  published-consumer:
    name: release-published-consumer
    if: ${{ needs.validate.outputs.publish == 'true' }}
    needs:
      - validate
      - publish
    uses: ./.github/workflows/published-consumer-validation.yml
    with:
      consumer_repository: ${{ needs.validate.outputs.consumer_repository }}
      consumer_ref: ${{ needs.validate.outputs.consumer_ref }}
      target_path: Tooling/deployment/VIP_Post-Install Custom Action.vi
      compare_modes: default,attributes,front-panel,block-diagram
      max_pairs: '5'
      max_signal_pairs: '5'
      latest_immutable_tag: ${{ needs.validate.outputs.immutable_tag }}
    secrets: inherit
